    .card,

      padding: 18px;
      margin: 16px 0;
      background: var(--panel);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;

    label,
    select,
    input,

    select,

      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-strong);
      color: var(--ink);
      padding: 8px 10px;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--blue-dark);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      background: #dfe8f3;
      color: var(--blue-dark);
    }

    button.green {
      background: var(--green);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .muted {
      color: var(--muted);
    }

    .batch {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(0, 200, 83, 0.45);
      border-radius: 999px;
      padding: 4px 10px;
      color: var(--green);
      font-weight: 900;
      background: rgba(0, 200, 83, 0.08);
    }

    .progress {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 12px;
    }

    .bar {
      flex: 1 1 220px;
      height: 10px;
      border-radius: 999px;
      background: #dde7ef;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), var(--green-bright));
    }

    .choice {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-strong);
      color: var(--ink);
      text-align: left;
    }

    .choice.selected {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(11, 95, 255, 0.13);
    }

    .choice.correct {
      border-color: var(--green);
      background: rgba(0, 200, 83, 0.12);
    }

    .choice.incorrect {
      border-color: #c93f3f;
      background: rgba(201, 63, 63, 0.10);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .hidden {
      display: none !important;
    }

    .score {
      font-size: clamp(2rem, 5vw, 4rem);
      margin: 0;
      color: var(--blue-dark);
    }

    .review-item {
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }
  </style>
</head>

<header>

  </section>
</header>
<main>
  <section class="card">
    <div class="controls">
      <label>
        <span class="muted">Optional updated quiz JSON</span>
        <input id="file" type="file" accept=".json,application/json" />
      </label>
      <label>
        <span class="muted">Generated test batch</span>
        <select id="sets"></select>
      </label>
      <button class="green" onclick="startQuiz()">Start Test</button>
      <button class="secondary" onclick="showKey()">Answer Key</button>
    </div>
    <p id="status" class="muted">Loading embedded generated test batches.</p>
  </section>

  <section id="quiz" class="question-card hidden"></section>
  <section id="result" class="card hidden"></section>
  <section id="key" class="card hidden"></section>
</main>

<script>
let sets = [];
let current = null;
let questionIndex = 0;
let answers = {};
let checked = {};

const $ = id => document.getElementById(id);

window.addEventListener('DOMContentLoaded', () => {
  loadEmbeddedQuizData();
});

function loadEmbeddedQuizData() {
  const embedded = document.getElementById('wov-quiz-data');
  if (!embedded) {
    $('sets').innerHTML = '<option value="">Load JSON first</option>';
    return;
  }
  try {
    const data = JSON.parse(embedded.textContent);
    loadQuizSets(data, 'embedded generated test batch');
  } catch (err) {
    $('status').textContent = `Embedded quiz data error: ${err.message}`;
  }
}

function loadQuizSets(data, sourceLabel) {
  sets = Array.isArray(data) ? data : (data.sets || data.exams || []);
  $('sets').innerHTML = sets
    .map((s, i) => `<option value="${i}">${escapeHtml(s.title || 'Quiz Set')} | ${escapeHtml(s.batch_id || s.id || 'NO-BATCH')}</option>`)
    .join('');
  $('status').textContent = `Loaded ${sets.length} ${sourceLabel}(es).`;
}

$('file').addEventListener('change', async event => {
  try {
    const file = event.target.files[0];
    if (!file) return;
    const text = await file.text();
    const data = JSON.parse(text);
    loadQuizSets(data, 'updated generated test batch');
  } catch (err) {
    $('status').textContent = err.message;
  }
});

function escapeHtml(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function normalizeSet(raw, index) {
  if (!raw) throw new Error('Load the quiz JSON and choose a test batch first.');
  const batch = raw.batch_id || raw.id || `T5-UNBATCHED-E${index + 1}`;
  const questions = (raw.questions || []).map((q, i) => ({
    number: q.number || i + 1,
    prompt: q.prompt || q.stem || q.question || '',
    choices: q.choices || {},
    answer: q.answer || '',
    explanation: q.explanation || q.rationale || '',
    batch_id: q.batch_id || batch,
  }));
  return {
    title: raw.title || `Quiz Set ${index + 1}`,
    batch_id: batch,
    source_file: raw.source_file || '',
    questions,
  };
}

function startQuiz() {
  try {
    current = normalizeSet(sets[Number($('sets').value || 0)], Number($('sets').value || 0));
    questionIndex = 0;
    answers = {};
    checked = {};
    $('key').classList.add('hidden');
    $('result').classList.add('hidden');
    $('quiz').classList.remove('hidden');
    $('status').innerHTML = `Active batch: <span class="batch">${escapeHtml(current.batch_id)}</span>`;
    renderQuestion();
  } catch (err) {
    $('status').textContent = err.message;
  }
}

function renderQuestion() {
  const q = current.questions[questionIndex];
  const total = current.questions.length;
  const selected = answers[q.number] || '';
  const isChecked = Boolean(checked[q.number]);
  const pct = total ? ((questionIndex + 1) / total) * 100 : 0;

  $('quiz').innerHTML = `
    <div class="progress">
      <strong>${escapeHtml(current.title)}</strong>
      <span class="batch">${escapeHtml(current.batch_id)}</span>
      <span class="muted">Question ${questionIndex + 1} of ${total}</span>
      <div class="bar" aria-label="Progress"><span style="width:${pct}%"></span></div>
    </div>
    <h2>${escapeHtml(q.number)}. ${escapeHtml(q.prompt)}</h2>
    ${Object.entries(q.choices).map(([letter, text]) => renderChoice(q, letter, text, selected, isChecked)).join('')}
    ${isChecked ? renderFeedback(q, selected) : ''}
    <div class="row">
      <button class="secondary" onclick="previousQuestion()" ${questionIndex === 0 ? 'disabled' : ''}>Previous</button>
      <button onclick="checkQuestion()" ${selected ? '' : 'disabled'}>${isChecked ? 'Checked' : 'Check Answer'}</button>
      <button class="green" onclick="nextQuestion()">${questionIndex === total - 1 ? 'Finish' : 'Next Question'}</button>
    </div>
  `;
}

function renderChoice(q, letter, text, selected, isChecked) {
  const classes = ['choice'];
  if (selected === letter) classes.push('selected');
  if (isChecked && letter === q.answer) classes.push('correct');
  if (isChecked && selected === letter && selected !== q.answer) classes.push('incorrect');
  return `<button class="${classes.join(' ')}" onclick="selectAnswer('${q.number}', '${letter}')" ${isChecked ? 'disabled' : ''}>
    <strong>${escapeHtml(letter)}.</strong> ${escapeHtml(text)}
  </button>`;
}

function renderFeedback(q, selected) {
  const correct = selected === q.answer;
  return `<div class="card">
    <strong>${correct ? 'Correct.' : `Not quite. Correct answer: ${escapeHtml(q.answer)}.`}</strong>
    <p>${escapeHtml(q.explanation || 'No explanation provided.')}</p>
  </div>`;
}

function selectAnswer(number, letter) {
  answers[number] = letter;
  renderQuestion();
}

function checkQuestion() {
  const q = current.questions[questionIndex];
  checked[q.number] = true;
  saveAttempt();
  renderQuestion();
}

function previousQuestion() {
  if (questionIndex > 0) {
    questionIndex -= 1;
    renderQuestion();
  }
}

function nextQuestion() {
  const q = current.questions[questionIndex];
  if (answers[q.number] && !checked[q.number]) checked[q.number] = true;
  if (questionIndex < current.questions.length - 1) {
    questionIndex += 1;
    saveAttempt();
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  saveAttempt();
  const total = current.questions.length;
  const score = current.questions.reduce((sum, q) => sum + (answers[q.number] === q.answer ? 1 : 0), 0);
  $('quiz').classList.add('hidden');
  $('key').classList.add('hidden');
  $('result').classList.remove('hidden');
  $('result').innerHTML = `
    <h2>Score</h2>
    <p class="batch">${escapeHtml(current.batch_id)}</p>
    <p class="score">${score}/${total}</p>
    <p>${Math.round((score / total) * 100)}% correct</p>
    <div class="row">
      <button onclick="reviewMissed()">Review Missed</button>
      <button class="secondary" onclick="startQuiz()">Restart Same Batch</button>
      <button class="secondary" onclick="showKey()">Answer Key</button>
    </div>
  `;
}

function scoreQuiz() {
  finishQuiz();
}

function reviewMissed() {
  const missed = current.questions.filter(q => answers[q.number] !== q.answer);
  $('result').innerHTML = `
    <h2>Missed Questions</h2>
    <p class="batch">${escapeHtml(current.batch_id)}</p>
    ${missed.length ? missed.map(q => `
      <div class="review-item">
        <strong>Q${escapeHtml(q.number)}. ${escapeHtml(q.prompt)}</strong>
        <p>Your answer: ${escapeHtml(answers[q.number] || 'blank')} | Correct: ${escapeHtml(q.answer)}</p>
        <p class="muted">${escapeHtml(q.explanation || '')}</p>
      </div>
    `).join('') : '<p>No missed questions.</p>'}
    <div class="row"><button class="secondary" onclick="finishQuiz()">Back to Score</button></div>
  `;
}

function showKey() {
  try {
    if (!current) current = normalizeSet(sets[Number($('sets').value || 0)], Number($('sets').value || 0));
    $('key').classList.remove('hidden');
    $('quiz').classList.add('hidden');
    $('result').classList.add('hidden');
    $('key').innerHTML = `<h2>Answer Key</h2><p class="batch">${escapeHtml(current.batch_id)}</p>` +
      current.questions.map(q => `<div class="review-item"><strong>Q${escapeHtml(q.number)}</strong>: ${escapeHtml(q.answer)}<p class="muted">${escapeHtml(q.explanation || '')}</p></div>`).join('');
  } catch (err) {
    $('status').textContent = err.message;
  }
}

function saveAttempt() {
  if (!current) return;
  const payload = {
    batch_id: current.batch_id,
    title: current.title,
    answers,
    updated_at: new Date().toISOString(),
  };
  localStorage.setItem(`wov-quiz-attempt-${current.batch_id}`, JSON.stringify(payload));
}
</script>
